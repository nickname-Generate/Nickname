<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="NickFinder Pro - The ultimate modern nickname generator.">
    <meta name="theme-color" content="#0B0B14">
    <title>Nickfinder | Premium Nicknames</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* 🌌 Dark Premium Color Palette */
            --bg-body: #05050A;
            --bg-app: #0B0B14;
            --text-main: #FFFFFF;
            --text-muted: #A0A5B5;
            
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-hover: rgba(255, 255, 255, 0.08);
            
            /* The signature purple-to-cyan glow */
            --btn-grad: linear-gradient(90deg, #A25BFE, #63E3FF);
            
            --radius-md: 20px;
            --radius-pill: 99px;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* 📱 Main App Container */
        .app-container {
            width: 100%;
            max-width: 540px;
            background-color: var(--bg-app);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 60px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            z-index: 1;
        }

        /* 🎨 Background Blur Blobs & Image */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -2;
            opacity: 0.6;
            animation: pulse 8s ease-in-out infinite alternate;
        }
        .orb-purple { top: -5%; left: -20%; width: 350px; height: 350px; background: #4B1D6F; }
        .orb-blue { top: 15%; right: -20%; width: 300px; height: 300px; background: #1A3E7B; }

        .bg-panda {
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 120%;
            max-width: 600px;
            opacity: 0.6;
            filter: blur(4px);
            z-index: -1;
            /* Fades the bottom of the image into the background */
            -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.1); opacity: 0.8; }
        }

        /* 🧭 Top Navigation */
        .top-nav {
            display: flex;
            justify-content: space-between;
            padding: 1.5rem 1.5rem 0;
            position: relative;
            z-index: 10;
        }

        .nav-btn {
            width: 48px; height: 48px;
            border-radius: 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            display: grid;
            place-items: center;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition-smooth);
        }
        .nav-btn.font-outfit { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.3rem; }
        .nav-btn:hover { background: var(--glass-hover); border-color: rgba(255,255,255,0.25); }

        /* 🌌 Hero Header */
        header {
            text-align: center;
            padding: 2.5rem 1.5rem 2rem;
            position: relative;
            z-index: 10;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.4rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.6);
            margin-bottom: 0.2rem;
        }

        header p {
            font-size: 1.05rem;
            color: #E2E8F0;
            font-weight: 500;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* 🔍 Glassmorphism Pill Search Bar */
        .search-container {
            margin: 0 1.5rem 2.5rem;
            position: relative;
            z-index: 10;
        }

        .search-wrapper {
            background: rgba(15, 15, 25, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-pill);
            display: flex;
            align-items: center;
            padding: 6px 6px 6px 20px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: var(--transition-smooth);
        }

        .search-wrapper:focus-within {
            border-color: rgba(162, 91, 254, 0.5);
            box-shadow: 0 15px 35px rgba(162, 91, 254, 0.15);
        }

        .search-icon { color: var(--text-muted); width: 22px; height: 22px; }

        .search-input {
            flex: 1;
            min-width: 0; 
            border: none; outline: none;
            padding: 0.8rem 1rem;
            font-size: 1.05rem;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background: transparent;
        }

        .search-input::placeholder { color: #8A8F9E; }
        .search-input:disabled { opacity: 0.7; }

        .clear-btn {
            background: rgba(255,255,255,0.1);
            border: none; color: white;
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; display: none; margin-right: 10px;
        }
        .clear-btn:hover { background: rgba(255,255,255,0.2); }

        .search-btn {
            background: var(--btn-grad);
            color: white;
            border: none;
            padding: 0.9rem 1.6rem;
            border-radius: var(--radius-pill);
            font-weight: 600; font-size: 1.05rem;
            cursor: pointer;
            transition: transform 0.2s;
            min-width: 115px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(99, 227, 255, 0.2);
        }
        .search-btn:active:not(:disabled) { transform: scale(0.95); }
        .search-btn:disabled { opacity: 0.8; cursor: not-allowed; }

        /* Loading Spinner */
        .btn-spinner {
            width: 22px; height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%; border-top-color: #ffffff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 🎛️ App Filters */
        .filters {
            display: flex; align-items: center;
            gap: 2px;
            margin: 0 1.5rem 1.5rem;
            overflow-x: auto;
            scrollbar-width: none;
            position: relative; z-index: 10;
        }
        .filters::-webkit-scrollbar { display: none; }

        .chip {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 0.7rem 1.2rem;
            border-radius: 16px;
            font-size: 1rem; font-weight: 500;
            cursor: pointer; white-space: nowrap;
            font-family: 'Inter', sans-serif;
            position: relative; transition: 0.3s ease;
        }
        
        /* Active Chip (Glass Pill) */
        .chip.active { 
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: white; 
            backdrop-filter: blur(10px);
        }

        /* Vertical Divider between inactive chips */
        .chip:not(.active) + .chip:not(.active)::before {
            content: '';
            position: absolute;
            left: 0; top: 30%;
            height: 40%; width: 1px;
            background: rgba(255, 255, 255, 0.15);
        }

        /* 🃏 Dark Cards UI (SINGLE COLUMN) */
        .nickname-list {
            padding: 0 1.5rem 6rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            position: relative; z-index: 10;
        }

        .nickname-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 1.5rem 1rem;
            text-align: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 90px;
            position: relative;
            opacity: 0;
            animation: slideUp 0.4s ease forwards;
            width: 100%;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nickname-card:hover { 
            background: var(--glass-hover);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .nickname-card:active { transform: scale(0.96); }

        .nickname-text {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
            word-break: break-all;
            line-height: 1.2;
        }

        /* Floating Copy Icon on Hover */
        .copy-icon {
            position: absolute; top: 12px; right: 12px;
            color: var(--text-muted); opacity: 0;
            transition: 0.2s;
        }
        .nickname-card:hover .copy-icon { opacity: 1; color: white; }

        /* Skeletons for Grid */
        .skeleton-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            height: 90px;
            display: flex; align-items: center; justify-content: center;
            width: 100%;
        }
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
            border-radius: 8px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Floating Action Button (FAB) */
        .fab {
            position: fixed;
            bottom: 2rem;
            right: calc(50% - 250px);
            width: 58px; height: 58px;
            border-radius: 50%;
            background: var(--btn-grad);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(162, 91, 254, 0.4);
            border: none; color: white; cursor: pointer;
            z-index: 50; transition: transform 0.2s;
        }
        .fab:hover { transform: scale(1.08); }
        .fab:active { transform: scale(0.95); }

        @media (max-width: 540px) {
            .fab { right: 1.5rem; }
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center; padding: 3rem 1rem;
            color: var(--text-muted);
        }

        /* 🟢 Modern Dark Toast */
        .toast {
            position: fixed; bottom: 2.5rem; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px); color: white;
            padding: 1rem 1.5rem; border-radius: var(--radius-pill);
            font-weight: 500; font-size: 0.95rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex; align-items: center; gap: 12px;
            transition: var(--transition-smooth); z-index: 1000; opacity: 0;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast-icon {
            background: var(--btn-grad);
            border-radius: 50%; width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Blobs & Panda Image -->
        <div class="bg-orb orb-purple"></div>
        <div class="bg-orb orb-blue"></div>
        <img src="https://i.ibb.co/JRYJc53X/1771695191540.png" class="bg-panda" alt="Panda Background">

        <!-- Top Navigation -->
        <div class="top-nav">
            <button class="nav-btn font-outfit">SF</button>
            <button class="nav-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
            </button>
        </div>

        <!-- Header -->
        <header>
            <h1>Nickfinder</h1>
            <p>Generate Pro Gaming Names ✨</p>
        </header>

        <main>
            <!-- Floating Search Bar -->
            <div class="search-container">
                <div class="search-wrapper">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="Type a cool name...">
                    <button id="clearBtn" class="clear-btn" title="Clear">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                    <button id="searchBtn" class="search-btn">Generate</button>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters" id="filterContainer">
                <button class="chip active" data-filter="all">Trending</button>
                <button class="chip" data-filter="boy">Boys</button>
                <button class="chip" data-filter="girl">Girls</button>
                <button class="chip" data-filter="symbols">Stylish</button>
            </div>

            <!-- Grid Container -->
            <div id="nicknameList" class="nickname-list">
                <!-- Skeletons Initial State -->
                <div class="skeleton-card"><div class="skeleton" style="width: 70%; height: 22px;"></div></div>
                <div class="skeleton-card"><div class="skeleton" style="width: 50%; height: 22px;"></div></div>
                <div class="skeleton-card"><div class="skeleton" style="width: 80%; height: 22px;"></div></div>
                <div class="skeleton-card"><div class="skeleton" style="width: 60%; height: 22px;"></div></div>
            </div>
        </main>
        
        <!-- FAB (Floating Export/Share button from design) -->
        <button class="fab" title="Share">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                <polyline points="16 6 12 2 8 6"></polyline>
                <line x1="12" y1="2" x2="12" y2="15"></line>
            </svg>
        </button>
    </div>

    <!-- App Toast Notification -->
    <div id="toast" class="toast">
        <div class="toast-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <span id="toastMsg">Copied to clipboard!</span>
    </div>

    <!-- Application Logic (Firebase & Generators) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const configGame = { 
            apiKey: "AIzaSyCpVS-SVaIJI6DN8AqnoYslb1vujw8N1ds", 
            authDomain: "game-cd989.firebaseapp.com", 
            databaseURL: "https://game-cd989-default-rtdb.firebaseio.com", 
            projectId: "game-cd989" 
        };

        const app = initializeApp(configGame);
        const db = getDatabase(app);
        const nicknamesRef = ref(db, 'nicknames');

        let nicknamesDB = [];
        let currentData = [];
        let activeFilter = 'all';
        let isDataLoaded = false;
        
        let customGeneratedStyles = [];
        let previousQuery = "";

        const listContainer = document.getElementById('nicknameList');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const clearBtn = document.getElementById('clearBtn');
        const filterContainer = document.getElementById('filterContainer');
        const chips = document.querySelectorAll('.chip');
        const toast = document.getElementById('toast');

        // POPULAR SYMBOLS FOR STYLISH TAB
        const popularSymbolsList = [
            '×͜×', '亗', '★', 'シ', '༒', '࿐', '✧', '♕', '☠'
        ];

        // Fetch Data
        onValue(nicknamesRef, (snapshot) => {
            nicknamesDB = [];
            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    nicknamesDB.push({
                        id: childSnapshot.key,
                        name: data.name,
                        tags: data.tags || []
                    });
                });
            }
            isDataLoaded = true;
            filterData();
        });

        // 🔠 Style Generators
        function convertToFullWidth(text) {
            return text.split('').map(char => {
                const code = char.charCodeAt(0);
                if (code >= 33 && code <= 126) return String.fromCharCode(code + 65248);
                if (code === 32) return String.fromCharCode(12288);
                return char;
            }).join('');
        }

        function convertToSmallCaps(text) {
            const smlCapsMap = {
                'a':'ᴀ','b':'ʙ','c':'ᴄ','d':'ᴅ','e':'ᴇ','f':'ғ','g':'ɢ','h':'ʜ','i':'ɪ',
                'j':'ᴊ','k':'ᴋ','l':'ʟ','m':'ᴍ','n':'ɴ','o':'ᴏ','p':'ᴘ','q':'ǫ','r':'ʀ',
                's':'s','t':'ᴛ','u':'ᴜ','v':'ᴠ','w':'ᴡ','x':'x','y':'ʏ','z':'ᴢ'
            };
            return text.toLowerCase().split('').map(char => smlCapsMap[char] || char).join('');
        }

        function convertToNinjaFont(text) {
            const ninjaMap = {
                'a':'么','b':'乃','c':'匚','d':'刀','e':'乇','f':'乍','g':'巨','h':'卄','i':'丨',
                'j':'ﾌ','k':'Ҝ','l':'乚','m':'爪','n':'冂','o':'口','p':'尸','q':'Ｑ','r':'尺',
                's':'Ｓ','t':'ㄒ','u':'凵','v':'∨','w':'山','x':'乂','y':'ㄚ','z':'乙'
            };
            return text.toLowerCase().split('').map(char => ninjaMap[char] || char).join('');
        }

        // 🎲 Random Style Generation (UPDATED FOR DUMDUM FONT AT TOP)
        function generateRandomStyles(query, count = 10) {
            const formattedQuery = query.replace(/ /g, 'ㅤ');
            
            const fonts = [
                { name: 'Normal', fn: t => t },
                { name: 'Ninja', fn: convertToNinjaFont },
                { name: 'sᴍʟᴄᴀᴘ', fn: convertToSmallCaps },
                { name: 'Ｄｕｍ', fn: convertToFullWidth }
            ];
            
            // REMOVED "༺" FROM HERE
            const pairs = [
                ["✨", "✨"], ["乂", "乂"], ["『", "』"], ["【", "】"],
                ["★", "★"], ["", "ㅤツ"], ["", "ㅤ모"], ["", "ㅤ×͜×"], ["", "ㅤ亗"],
                ["", "ㅤ࿐"], ["", "ㅤシ"], ["༒", "༒"]
            ];
            
            let results = [];
            
            // 1. ALWAYS ADD "DumDum" (Full-width) style FIRST, simple with NO extra symbols
            results.push({ name: convertToFullWidth(query) });

            // 2. Add the rest of the random stylish ones
            for(let i = 0; i < count - 1; i++) {
                const randomFont = fonts[Math.floor(Math.random() * fonts.length)];
                const randomPair = pairs[Math.floor(Math.random() * pairs.length)];
                
                const finalName = `${randomPair[0]}${randomFont.fn(formattedQuery)}${randomPair[1]}`;
                results.push({ name: finalName });
            }
            return results;
        }

        // Show elegant skeleton loaders for the dark UI
        function showSkeletons() {
            listContainer.innerHTML = `
                <div class="skeleton-card"><div class="skeleton" style="width: 60%; height: 22px;"></div></div>
                <div class="skeleton-card"><div class="skeleton" style="width: 80%; height: 22px;"></div></div>
                <div class="skeleton-card"><div class="skeleton" style="width: 50%; height: 22px;"></div></div>
                <div class="skeleton-card"><div class="skeleton" style="width: 70%; height: 22px;"></div></div>
                <div class="skeleton-card"><div class="skeleton" style="width: 75%; height: 22px;"></div></div>
                <div class="skeleton-card"><div class="skeleton" style="width: 40%; height: 22px;"></div></div>
            `;
        }

        function createCard(text, delay) {
            const card = document.createElement('div');
            card.className = 'nickname-card';
            card.style.animationDelay = `${delay}s`;

            card.innerHTML = `
                <span class="nickname-text">${text}</span>
                <svg class="copy-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            `;
            card.addEventListener('click', () => handleCopy(card, text));
            return card;
        }

        function renderList() {
            listContainer.innerHTML = '';
            const query = searchInput.value.trim();
            let animationDelay = 0;

            // Render Auto-Generated Styles first
            if (query.length > 0 && customGeneratedStyles.length > 0) {
                customGeneratedStyles.forEach((style) => {
                    listContainer.appendChild(createCard(style.name, animationDelay));
                    animationDelay += 0.05;
                });
            }

            // Render matching DB names
            currentData.forEach((item) => {
                listContainer.appendChild(createCard(item.name, animationDelay));
                animationDelay += 0.05;
            });

            // Empty State
            if (listContainer.innerHTML === '') {
                listContainer.innerHTML = `<div class="empty-state">No matching names found.</div>`;
            }
        }

        function filterData() {
            if(!isDataLoaded) return;
            const query = searchInput.value.toLowerCase().trim();

            if (query.length > 0) {
                filterContainer.style.display = 'none';
                clearBtn.style.display = 'flex';

                if(activeFilter === 'symbols') {
                    activeFilter = 'all';
                    chips.forEach(c => c.classList.remove('active'));
                    document.querySelector('[data-filter="all"]').classList.add('active');
                }

                if (previousQuery !== query) {
                    customGeneratedStyles = generateRandomStyles(searchInput.value.trim(), 8);
                    previousQuery = query;
                }
            } else {
                filterContainer.style.display = 'flex';
                clearBtn.style.display = 'none';
                customGeneratedStyles = [];
                previousQuery = "";
            }

            // Symbols rendering (Stylish Tab)
            if (activeFilter === 'symbols' && query.length === 0) {
                listContainer.innerHTML = '';
                let delay = 0;
                popularSymbolsList.forEach((sym) => {
                    listContainer.appendChild(createCard(sym, delay));
                    delay += 0.03;
                });
                return; 
            }

            currentData = nicknamesDB.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(query);
                const matchesTag = activeFilter === 'all' || (item.tags && item.tags.includes(activeFilter));
                return matchesSearch && matchesTag;
            });
            renderList();
        }

        // Event Listeners
        searchInput.addEventListener('input', filterData);
        
        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if(query.length > 0) {
                
                searchBtn.disabled = true;
                searchInput.disabled = true;
                clearBtn.disabled = true;
                const originalBtnText = searchBtn.innerHTML;
                
                searchBtn.innerHTML = '<div class="btn-spinner"></div>';
                showSkeletons();
                
                setTimeout(() => {
                    customGeneratedStyles = generateRandomStyles(query, 14); 
                    renderList(); 
                    
                    searchBtn.disabled = false;
                    searchInput.disabled = false;
                    clearBtn.disabled = false;
                    searchBtn.innerHTML = originalBtnText;
                }, 2500);
            }
        });

        clearBtn.addEventListener('click', () => {
            searchInput.value = '';  
            customGeneratedStyles = [];
            previousQuery = "";
            filterData();            
            searchInput.focus();     
        });

        chips.forEach(chip => {
            chip.addEventListener('click', (e) => {
                chips.forEach(c => c.classList.remove('active'));
                e.target.classList.add('active');
                activeFilter = e.target.getAttribute('data-filter');
                filterData();
            });
        });

        async function handleCopy(cardElement, textToCopy) {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(textToCopy);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = textToCopy;
                    textArea.style.position = "fixed"; textArea.style.left = "-999999px";
                    document.body.appendChild(textArea);
                    textArea.focus(); textArea.select();
                    document.execCommand('copy');
                    textArea.remove();
                }

                // Add subtle green flash to card border on copy
                const originalBorder = cardElement.style.borderColor;
                cardElement.style.borderColor = '#10b981';
                setTimeout(() => cardElement.style.borderColor = originalBorder, 500);

                toast.classList.add('show');
                if(window.navigator && window.navigator.vibrate) navigator.vibrate(50);
                setTimeout(() => toast.classList.remove('show'), 2500);

            } catch (err) { alert("Copy failed. Please try again."); }
        }
    </script>
</body>
</html>
